name: docker image

# Build the portable, batteries-included image, run a FULL audit end-to-end inside
# it on native amd64 (the platform the baked detector binaries need — they use
# AVX2, which Apple-Silicon emulation lacks), and publish it to GHCR so users can
# `docker pull` instead of `docker build`.
#
#   - pull_request touching the image  -> build + self-test only (no push)
#   - push to main                     -> build + self-test + push :latest + :sha-<short>
#   - push tag v*                      -> build + self-test + push :<version>
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - environment.yml
      - examples/quickstart/**
      - .github/workflows/docker.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/veritas-leakage

jobs:
  image:
    name: build, self-test, publish to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # :latest on main, :<version> on v* tags, :sha-<short> always.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,format=short

      - uses: docker/setup-buildx-action@v3

      # Build natively (amd64 runner) and load into the daemon so the self-test
      # can actually run the audit before we publish anything.
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve a local image tag for the self-test
        id: img
        run: echo "ref=$(printf '%s\n' '${{ steps.meta.outputs.tags }}' | head -n1)" >> "$GITHUB_OUTPUT"

      - name: CLI runs in-container
        run: docker run --rm "${{ steps.img.outputs.ref }}" --help

      - name: Full audit end-to-end in-container (live mmseqs detection, native amd64)
        run: |
          mkdir -p out && chmod 777 out
          docker run --rm -v "$PWD/out:/work" "${{ steps.img.outputs.ref }}" audit \
            --sequences /opt/veritas/examples/quickstart/eval.fasta \
            --table /opt/veritas/examples/quickstart/table.csv \
            --reference /opt/veritas/examples/quickstart/reference.fasta \
            --config /opt/veritas/examples/quickstart/config.json \
            --metric accuracy --out /work/report.json

      - name: Assert the reported -> honest collapse + leakage
        run: |
          python3 - <<'PY'
          import json
          r = json.load(open("out/report.json"))
          assert r["status"] == "ok", r["status"]
          assert abs(r["reported"]["value"] - 0.75) < 1e-9, r["reported"]
          assert abs(r["honest"]["value"] - 0.5) < 1e-9, r["honest"]
          assert r["leakage"]["n_contaminated"] == 2, r["leakage"]
          assert r["audit_hash"], "missing audit_hash"
          print("docker full-audit OK:", r["reported"]["value"], "->", r["honest"]["value"],
                "| contaminated", r["leakage"]["n_contaminated"], "/", r["leakage"]["n_eval"])
          PY

      - name: Leakage gate passes
        run: docker run --rm -v "$PWD/out:/work" "${{ steps.img.outputs.ref }}" gate --report /work/report.json --max-delta 0.5

      # Publish only after the self-test passes, and only on main / version tags.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
