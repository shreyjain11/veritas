name = "proteingym_dms"
license = "MIT (OATML-Markslab/ProteinGym); cite the underlying assay papers (assays.bib)"
redistributable = true
description = """
ProteinGym DMS substitutions, for the MSA-depth STRATIFICATION demo (no contamination
claim). License is MIT, but the slice is FETCH-ONLY BY CHOICE (not committed): the data
is large and easily re-fetched. All three upstream archives are pinned below; the user
fetches them with scripts/fetch_demo_data.py. Baseline whose performance is stratified =
ESM-1v (ensemble), from ProteinGym's zero-shot substitution scores (Meier et al., NeurIPS
2021). Claim is correlational only: Veritas recovers the MSA-depth performance gradient
ProteinGym/ESM-1v document; not a causal MSA-depth claim (depth correlates with family /
organism / assay-type and observational data cannot fully de-confound).
"""
slice_spec = """
~10-15 assays per MSA_Neff_L_category bucket (Low/Medium/High), selected neutrally
(alphabetical by DMS_id, single_mutants >= 100, present in the scores zip). Single-
substitution variants only. Per assay: Spearman(DMS_score, ESM1v_ensemble); per bucket:
MEAN of per-assay Spearman (never pooled cross-assay), with assay count and spread.
"""

