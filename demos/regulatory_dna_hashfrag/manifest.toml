name = "regulatory_dna_hashfrag"
license = "MIT (de-Boer-Lab/hashFrag)"
redistributable = true
description = """
hashFrag example MPRA splits (de-Boer-Lab/hashFrag, data/ @ commit \
c92324f33f6e19266884d32b693ae907d5eb2dbf). MIT-licensed, so the curated slice is \
committed under vendored/. NOTE: these files are SEQUENCES ONLY (no expression \
labels) -- they support the R2 leakage-RATE reproduction (cross-split homology \
against the declared train/test split), not a model metric delta. The filtered \
split is hashFrag's homology-pruned test set: 197 of 2000 test sequences removed \
(9.85%) at its default BLAST threshold (train 8000 / test 2000 / filtered 1803).
"""
slice_spec = "train split (8000) + test split (2000) + homology-filtered test (1803 kept)"

