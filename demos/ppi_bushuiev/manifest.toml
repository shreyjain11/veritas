name = "ppi_bushuiev"
license = "PPIRef code MIT (anton-bushuiev/PPIRef); SKEMPI v2.0 academic terms; PDB sequences public domain; Pfam-A CC0"
redistributable = true
description = """
Unified PPI leakage-DETECTION demo (no trained model is released by Bushuiev et al.,
arXiv:2404.10457, so this is detection-only -- no reported-vs-honest metric delta). It
demonstrates Veritas's family (Pfam/pyhmmer) and structural (foldseek) detectors on a
sequence-similarity split of SKEMPI v2.0 interfaces (interface PDBs from PPIRef, Zenodo
record 13208732).

THREE parts, locked to the observed numbers (see docs/validation.md):
  1. Demonstration -- MMseqs2-30% sequence split: sequence 0% (by construction), family
     34.6%, fold-level structural 38.5% (TM>=0.5). Family + structure catch homology that
     sequence-identity splitting misses (Bushuiev's thesis, demonstrated independently).
  2. Pr/PI negative control (published SKEMPI Hold_out_type, independent of the immune
     set): ~0% across all three detectors -- Veritas does not false-alarm on a clean split.
  3. Immune-category finding: AB/AG and TCR/pMHC hold-outs leak 87-100% via shared
     immunoglobulin domains (C1-set/V-set; Ig-fold MHC) -- category-blind splitting is
     insufficient.

METHOD CAVEAT (prominent): Veritas's structural detector measures FOLD-level homology
(foldseek monomer TMalign, qtmscore/ttmscore), a related but MORE PERMISSIVE signal than
iDist's INTERFACE-level redundancy -- the rates are NOT directly comparable; we corroborate
Bushuiev's thesis qualitatively, not numerically.

REDISTRIBUTABLE SLICE: only vendored/chains.fasta is committed -- the full per-chain
RCSB/PDB sequences (PDB data is public domain), needed so the demo is reproducible without
345 per-entry RCSB calls. The SKEMPI table, the PPIRef interface structures, and Pfam-A
are FETCH-ONLY (pinned below; never hosted here).
"""
slice_spec = """
348 SKEMPI v2.0 interfaces (PPIRef skempi2.zip interface PDBs), 921 chains. Splits are
CONSTRUCTED deterministically: (a) MMseqs2-30% -- mmseqs easy-search exhaustive over all
chains, an interface-pair edge iff any chain pair has identity>=0.30 AND coverage>=0.50;
connected components; whole components assigned to test (seed 1729, ~15% -> 52 test / 296
train). (b) Category split -- SKEMPI Hold_out_type mapped by PDB-id prefix; hold out one
category (Pr/PI, AB/AG, or TCR/pMHC) as test vs the others as train. Detectors:
sequence = mmseqs (id>=0.30, cov>=0.50); family = pyhmmer vs Pfam-A (e<=1e-3);
structural = foldseek --alignment-type 1, tm = max(qtmscore, ttmscore), TM>=0.50.
"""

